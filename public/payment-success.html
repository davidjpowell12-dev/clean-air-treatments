<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Payment Successful | Clean Air</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    :root { --green: #4a7c2e; --green-dark: #3a6324; --gray-50: #f9fafb; --gray-400: #9ca3af; --gray-500: #6b7280; --gray-900: #111827; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .header { background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%); padding: 32px 20px 40px; text-align: center; color: white; }
    .header img { height: 52px; margin-bottom: 8px; filter: brightness(0) invert(1); }
    .header h1 { font-size: 22px; font-weight: 700; }
    .content { max-width: 480px; margin: -20px auto 0; padding: 0 16px 32px; }
    .card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 48px 32px; text-align: center; }
    .check-circle { width: 80px; height: 80px; border-radius: 50%; background: #ecfdf5; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px; }
    .card h2 { font-size: 24px; color: #065f46; margin-bottom: 8px; }
    .card p { font-size: 15px; color: var(--gray-500); line-height: 1.5; margin-bottom: 8px; }
    .invoice-badge { display: inline-block; background: var(--gray-50); border: 1px solid #e5e7eb; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; color: var(--gray-900); margin-top: 16px; font-family: monospace; letter-spacing: 0.5px; }
    .amount { font-size: 32px; font-weight: 800; color: var(--green-dark); margin: 16px 0 4px; }
    .footer { text-align: center; padding: 24px; font-size: 12px; color: var(--gray-400); }
  </style>
</head>
<body>
  <div class="header">
    <img src="/logo.png" alt="Clean Air Lawn Care">
    <h1>Clean Air Lawn Care</h1>
  </div>
  <div class="content">
    <div class="card" id="card">
      <div class="check-circle">\u2705</div>
      <h2>Payment Successful!</h2>
      <p>Thank you for your payment. A confirmation receipt has been sent to your email.</p>
      <p style="color:var(--gray-400);font-size:13px;margin-top:16px;">The Clean Air team will be in touch to schedule your services.</p>
    </div>
    <div class="footer">Powered by <strong>Clean Air Lawn Care</strong></div>
  </div>
</body>
</html>
