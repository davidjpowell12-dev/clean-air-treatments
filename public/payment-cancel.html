<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Payment Cancelled | Clean Air</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    :root { --green: #78be20; --green-dark: #5a9616; --gray-50: #f9fafb; --gray-400: #9ca3af; --gray-500: #6b7280; --gray-900: #111827; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .header { background: linear-gradient(135deg, var(--green) 0%, #6ab51e 50%, var(--green-dark) 100%); padding: 32px 20px 40px; text-align: center; color: white; }
    .header img { height: 52px; margin-bottom: 8px; }
    .header h1 { font-size: 22px; font-weight: 700; }
    .content { max-width: 480px; margin: -20px auto 0; padding: 0 16px 32px; }
    .card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 48px 32px; text-align: center; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .card h2 { font-size: 22px; margin-bottom: 8px; }
    .card p { font-size: 15px; color: var(--gray-500); line-height: 1.5; }
    .card a { display: inline-block; margin-top: 20px; padding: 14px 32px; background: var(--green); color: white; text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 15px; }
    .footer { text-align: center; padding: 24px; font-size: 12px; color: var(--gray-400); }
  </style>
</head>
<body>
  <div class="header">
    <img src="/logo.png" alt="Clean Air Lawn Care">
    <h1>Clean Air Lawn Care</h1>
  </div>
  <div class="content">
    <div class="card">
      <div class="icon">&#x21A9;&#xFE0F;</div>
      <h2>Payment Not Completed</h2>
      <p>No worries! Your proposal has been accepted but the payment was not completed. You can pay anytime using the link in your email.</p>
      <p style="font-size:13px;color:var(--gray-400);margin-top:12px;">If you have questions, contact the Clean Air team.</p>
    </div>
    <div class="footer">Powered by <strong>Clean Air Lawn Care</strong></div>
  </div>
</body>
</html>
